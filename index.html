<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD SOJOL Official</title>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        header { background: #1c2128; padding: 15px; border-bottom: 2px solid #00ffcc; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #00ffcc; font-weight: bold; padding-left: 20px; font-size: 20px; }
        nav a { color: white; text-decoration: none; margin-right: 15px; font-size: 16px; font-weight: bold; }
        nav a:hover { color: #00ffcc; }
        .container { padding: 40px 20px; }
        .sensi-box { background: #161b22; padding: 30px; border-radius: 15px; border: 1px solid #00ffcc; max-width: 400px; margin: auto; box-shadow: 0 0 15px rgba(0,255,204,0.2); }
        input { width: 90%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: none; outline: none; text-align: center; }
        button { background: #00ffcc; color: black; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 90%; }
        button:hover { transform: scale(1.02); box-shadow: 0 0 10px #00ffcc; }
        #result { margin-top: 20px; display: none; text-align: left; background: #0d1117; padding: 15px; border-radius: 10px; border: 1px dashed #00ffcc; }
    </style>
</head>
<body>
    <header>
        <div class="logo">MD SOJOL</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <div class="container">
        <h1 style="margin-bottom: 10px;">Welcome To My Website</h1>
        <p style="color: #00ffcc; margin-bottom: 30px;">GAMER | CONTENT CREATOR | WEB DEVELOPER</p>
        <div class="sensi-box">
            <h3 style="margin-bottom: 15px;">FF SENSI GENERATOR</h3>
            <input type="text" id="phoneModel" placeholder="মোবাইলের মডেল লিখুন...">
            <button onclick="generate()">GET SETTINGS</button>
            <div id="result">
                <p>General: <span id="gen" style="color:#00ffcc"></span></p>
                <p>Red Dot: <span id="red" style="color:#00ffcc"></span></p>
                <p>Fire Button: <span id="fire" style="color:#00ffcc">42%</span></p>
            </div>
        </div>
    </div>
    <script>
        function generate() {
            if(document.getElementById('phoneModel').value === "") { alert("দয়া করে মডেল লিখুন!"); return; }
            document.getElementById('gen').innerText = Math.floor(Math.random() * (100 - 95 + 1) + 95);
            document.getElementById('red').innerText = Math.floor(Math.random() * (95 - 85 + 1) + 85);
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
