<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOJOL_OS_ULTIMATE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        :root { --green: #0f0; --bg: #000; --red: #ff0000; }
        body, html { height: 100%; margin: 0; background: var(--bg); color: var(--green); font-family: 'Share Tech Mono', monospace; overflow: hidden; }
        
        #matrix { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.2; }
        
        .terminal-window {
            width: 90%; max-width: 900px; height: 80vh; margin: 5vh auto;
            border: 1px solid var(--green); background: rgba(0, 10, 0, 0.95);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2); display: flex; flex-direction: column;
        }

        .top-bar { background: var(--green); color: black; padding: 5px 15px; display: flex; justify-content: space-between; font-weight: bold; font-size: 12px; }
        
        #output { flex-grow: 1; padding: 20px; overflow-y: auto; font-size: 14px; line-height: 1.8; }
        
        .input-line { display: flex; padding: 10px 20px; background: rgba(0, 20, 0, 0.5); border-top: 1px solid var(--dim); }
        input { background: transparent; border: none; color: var(--green); outline: none; width: 100%; font-family: inherit; font-size: 16px; }

        .progress-bar { width: 0%; height: 10px; background: var(--green); margin-top: 10px; transition: width 0.1s; }
        .glitch { animation: glitch 1s infinite; }
        @keyframes glitch { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="terminal-window">
    <div class="top-bar">
        <span>SOJOL_CORE_SYSTEM_V3.0</span>
        <span>STATUS: ACTIVE</span>
    </div>
    <div id="output">
        <div class="glitch">[SYSTEM INITIALIZED...]</div>
        <div>[CONNECTED TO HOST: MDSOJOL-80]</div>
        <div>Type <span style="color:white">'help'</span> to see what I can do.</div>
    </div>
    <div class="input-line">
        <span>root@sojol:~$ &nbsp;</span>
        <input type="text" id="commandInput" autofocus autocomplete="off">
    </div>
</div>

<audio id="typeSound" src="https://www.soundjay.com/communication/typewriter-key-1.mp3"></audio>

<script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const letters = "010101SOJOLHACKER$#@&*";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0f0"; ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = letters.charAt(Math.floor(Math.random() * letters.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 35);

    const input = document.getElementById('commandInput');
    const output = document.getElementById('output');
    const sound = document.getElementById('typeSound');

    input.addEventListener('keydown', (e) => {
        sound.currentTime = 0;
        sound.play(); // টাইপিং সাউন্ড
        
        if (e.key === 'Enter') {
            const cmd = input.value.toLowerCase().trim();
            printLine(`> ${cmd}`, "white");

            if (cmd === 'help') {
                printLine("COMMANDS: 'bio', 'social', 'hack', 'matrix', 'clear', 'secret'");
            } else if (cmd === 'hack') {
                startHack();
            } else if (cmd === 'bio') {
                printLine("ACCESSING DATA... [NAME: SOJOL] [RANK: ALPHA DEVELOPER]");
            } else if (cmd === 'social') {
                printLine("FACEBOOK: mdsojol-80 | TIKTOK: Danger99901");
            } else if (cmd === 'secret') {
                printLine("ENTER ACCESS KEY...");
            } else if (cmd === '1234') { // আপনার সিক্রেট পাসওয়ার্ড
                document.documentElement.style.setProperty('--green', 'cyan');
                printLine("THEME CHANGED TO CYBER-BLUE", "cyan");
            } else if (cmd === 'clear') {
                output.innerHTML = "<div>[SYSTEM CLEARED]</div>";
            } else {
                printLine("[ERROR]: INVALID_COMMAND", "red");
            }

            input.value = "";
            output.scrollTop = output.scrollHeight;
        }
    });

    function printLine(text, color = "#0f0") {
        const div = document.createElement('div');
        div.style.color = color;
        div.innerHTML = text;
        output.appendChild(div);
    }

    function startHack() {
        printLine("[STARTING BRUTE FORCE ATTACK...]", "red");
        let i = 0;
        const bar = document.createElement('div');
        bar.className = "progress-bar";
        output.appendChild(bar);
        
        const interval = setInterval(() => {
            i += 5;
            bar.style.width = i + "%";
            if (i >= 100) {
                clearInterval(interval);
                printLine("[SUCCESS]: NASA DATABASE ACCESSED! (Just Kidding 😉)", "yellow");
            }
        }, 100);
    }
</script>
</body>
</html>
